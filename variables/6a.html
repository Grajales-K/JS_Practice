<body>
    <h1>Boolean and If-Statements practice</h1>
    <p>Use devtools to see the results</p>
    <script>
        // declare a clock variable between 0 and 23, and use if statements to print a greeting based on the time of day. For example, if the clock is between 6 and 12, print "Good morning". If the clock is between 12 and 18, print "Good afternoon". Otherwise, print "Good evening".

        // this value print good morning, at the value of 7, but if we change the value to 13, it will print good afternoon, and if we change the value to 19, it will print good evening.

        let hour = 7;

        if(hour >= 6 && hour < 12) {
            console.log("Good morning");
        } else if(hour >= 12 && hour < 18) {
            console.log("Good afternoon");
        } else {
            console.log("Good evening");
        }


    </script>
