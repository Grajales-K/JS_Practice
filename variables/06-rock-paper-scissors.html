<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
</head>

<body>
    <!-- In this simple game, we use an if statement to generate a random number between 0 and 1 and determine the computer's
    choice.

    First, we create a variable called computerMove. Then, we compare the random number against different ranges using if
    and else if statements.

    Depending on which range the random number falls into, we store either "rock", "paper", or "scissors" in the
    computerMove variable.

    0 ----- 0.33 ----- 0.66 ----- 1
       rock       paper     scissors -->

    <div class="nav">
        <p>Rock Paper Scissor</p>
        <button onclick="
            const randomNumber = Math.random();

            let computerMove = '';
            
            if(randomNumber >= 0 && randomNumber < 1 / 3) {
                computerMove = 'rock';
            } else if(randomNumber >= 1 / 3 && randomNumber < 2 / 3){
                computerMove = 'paper'
            } else if (randomNumber >= 2 / 3 && randomNumber < 1){
                computerMove = 'scissor'
            };


            let result = '';

            if (computerMove === 'rock'){
                result = 'Tie.'
            } else if (computerMove === 'paper'){
                result = 'You lose.'
            } else if (computerMove === 'scissor'){
                result = 'You Win.'
            };

            alert(`You picked rock. Computer picked a ${computerMove}. ${result}`);

        ">Rock</button>

        <button onclick="
            const randomNumber = Math.random();
    
            let computerMove = '';
            
            if(randomNumber >= 0 && randomNumber < 1 / 3) {
                computerMove = 'rock';
            } else if(randomNumber >= 1 / 3 && randomNumber < 2 / 3){
                computerMove = 'paper'
            } else if (randomNumber >= 2 / 3 && randomNumber < 1){
                computerMove = 'scissor'
            };
    
    
            let result = '';
    
            if (computerMove === 'rock'){
                result = 'You Win.'
            } else if (computerMove === 'paper'){
                result = 'Tie.'
            } else if (computerMove === 'scissor'){
                result = 'You Lose.'
            };
    
            alert(`You picked paper. Computer picked a ${computerMove}. ${result}`);

        ">Paper</button>

        <button onclick="
            const randomNumber = Math.random();
    
            let computerMove = '';
            
            if(randomNumber >= 0 && randomNumber < 1 / 3) {
                computerMove = 'rock';
            } else if(randomNumber >= 1 / 3 && randomNumber < 2 / 3){
                computerMove = 'paper'
            } else if (randomNumber >= 2 / 3 && randomNumber < 1){
                computerMove = 'scissor'
            };
    
            let result = '';
    
            if (computerMove === 'rock'){
                result = 'You Lose.'
            } else if (computerMove === 'paper'){
                result = 'You Win.'
            } else if (computerMove === 'scissor'){
                result = 'Tie.'
            };

            alert(`You picked Scissor. Computer picked a ${computerMove}. ${result}`);

        ">Scissors</button>
    </div>
</body>

</html>
